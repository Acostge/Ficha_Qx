<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PIEMCA - Ficha Qx</title>
    
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="#083264">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --piemca-bg: #f4f8fb;
            --piemca-card: #ffffff;
            --piemca-blue-light: #007cc2; /* Azul del logo PIEMCA */
            --piemca-blue-dark: #083264;  /* Azul oscuro complementario */
            --piemca-text-main: #0c1e36;
            --piemca-text-muted: #5c728a;
            --piemca-border-radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--piemca-bg);
            color: var(--piemca-text-main);
        }

        .app-container {
            max-width: 480px;
            margin: 0 auto;
            padding: 0 16px 40px 16px;
        }

        /* ENCABEZADO FIJO / STICKY CONTROLLER */
        .sticky-header {
            position: -webkit-sticky;
            position: sticky;
            top: 0;
            background-color: var(--piemca-bg);
            padding-top: 16px;
            padding-bottom: 10px;
            z-index: 90;
            /* Degradado sutil inferior para indicar que el contenido pasa por debajo */
            border-bottom: 1px solid rgba(8, 50, 100, 0.05);
            box-shadow: 0 8px 20px -8px rgba(8, 50, 100, 0.05);
        }

        header {
            margin-bottom: 16px;
            text-align: center;
        }

        header h1 {
            font-size: 1.4rem;
            color: var(--piemca-blue-dark);
            font-weight: 800;
            letter-spacing: -0.3px;
            text-transform: uppercase;
        }

        header p {
            font-size: 0.8rem;
            color: var(--piemca-text-muted);
            margin-top: 2px;
            font-weight: 500;
        }

        .selector-card {
            background: var(--piemca-card);
            padding: 16px;
            border-radius: var(--piemca-border-radius);
            box-shadow: 0 4px 20px rgba(8, 50, 100, 0.04);
            margin-bottom: 12px;
            border: 1px solid rgba(0, 124, 194, 0.06);
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--piemca-blue-dark);
            margin-bottom: 6px;
            letter-spacing: 0.8px;
        }

        select {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #e1e9f0;
            border-radius: 12px;
            background-color: #fafcfe;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--piemca-text-main);
            outline: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23007cc2' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 14px center;
            background-size: 14px;
            transition: all 0.25s ease;
        }

        select:focus {
            border-color: var(--piemca-blue-light);
            box-shadow: 0 0 0 3px rgba(0, 124, 194, 0.12);
            background-color: #ffffff;
        }

        .metric-badge {
            background: linear-gradient(135deg, var(--piemca-blue-dark), var(--piemca-blue-light));
            color: white;
            padding: 16px;
            border-radius: var(--piemca-border-radius);
            text-align: center;
            box-shadow: 0 6px 18px rgba(0, 124, 194, 0.15);
        }

        .metric-badge h2 {
            font-size: 2.3rem;
            font-weight: 800;
            line-height: 1;
        }

        .metric-badge p {
            font-size: 0.75rem;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
            font-weight: 700;
        }

        /* ÁREA DE SCROLL (ZONA DE GRÁFICOS) */
        .scrollable-content {
            margin-top: 16px;
        }

        .chart-card {
            background: var(--piemca-card);
            padding: 20px;
            border-radius: var(--piemca-border-radius);
            box-shadow: 0 4px 20px rgba(8, 50, 100, 0.03);
            margin-bottom: 16px;
            border: 1px solid rgba(8, 50, 100, 0.02);
        }

        .chart-card h3 {
            font-size: 0.9rem;
            color: var(--piemca-blue-dark);
            margin-bottom: 16px;
            font-weight: 700;
            border-left: 4px solid var(--piemca-blue-light);
            padding-left: 10px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 230px;
        }

        #loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--piemca-bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .spinner {
            border: 4px solid #e1e9f0;
            border-top: 4px solid var(--piemca-blue-light);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p style="margin-top: 14px; font-weight: 600; color: var(--piemca-blue-dark); font-size: 0.9rem; letter-spacing: 0.5px;">PIEMCA DATA CONNECT...</p>
    </div>

    <div class="app-container">
        
        <div class="sticky-header">
            <header>
                <h1>PIEMCA</h1>
                <p>Ficha Quirúrgica Inteligente</p>
            </header>

            <div class="selector-card">
                <div class="form-group">
                    <label for="select-doctor">Médico / Especialista</label>
                    <select id="select-doctor">
                        <option value="">Seleccione un doctor...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="select-anio">Año Fiscal</label>
                    <select id="select-anio" disabled>
                        <option value="">Seleccione el año...</option>
                    </select>
                </div>
            </div>

            <div id="badge-container" class="hidden">
                <div class="metric-badge">
                    <h2 id="txt-total">0</h2>
                    <p>Cirugías Realizadas</p>
                </div>
            </div>
        </div>

        <div id="dashboard-content" class="scrollable-content hidden">
            
            <div class="chart-card">
                <h3>Total de Procedimientos por Línea</h3>
                <div class="chart-container">
                    <canvas id="chart-lineas"></canvas>
                </div>
            </div>

            <div class="chart-card">
                <h3>Evolución Mensual</h3>
                <div class="chart-container">
                    <canvas id="chart-meses"></canvas>
                </div>
            </div>

            <div class="chart-card">
                <h3>Procedimientos por Género</h3>
                <div class="chart-container" style="height: 200px;">
                    <canvas id="chart-genero"></canvas>
                </div>
            </div>

            <div class="chart-card">
                <h3>Sub-líneas e Implantes Colocados</h3>
                <div class="chart-container" style="height: 280px;">
                    <canvas id="chart-sublineas"></canvas>
                </div>
            </div>

        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwwNKsZvkX-7JJwR7rTcrwioOlH4qpKGPYog8t9ZiTwNJoeKdUhGg2U5sP4IYXhSVdwbA/exec";
        
        let bdData = {};
        let chartsInstance = {};

        const selectDoctor = document.getElementById('select-doctor');
        const selectAnio = document.getElementById('select-anio');
        const dashboardContent = document.getElementById('dashboard-content');
        const badgeContainer = document.getElementById('badge-container');
        const loadingOverlay = document.getElementById('loading-overlay');
        const txtTotal = document.getElementById('txt-total');

        window.addEventListener('DOMContentLoaded', cargarDatos);

        async function cargarDatos() {
            try {
                const response = await fetch(API_URL);
                bdData = await response.json();
                
                if(bdData.error) {
                    alert("Error: " + bdData.error);
                    return;
                }

                const listaDoctores = Object.keys(bdData).sort();
                listaDoctores.forEach(doc => {
                    let opt = document.createElement('option');
                    opt.value = doc;
                    opt.textContent = doc;
                    selectDoctor.appendChild(opt);
                });

                loadingOverlay.classList.add('hidden');
            } catch (error) {
                console.error("Error:", error);
                alert("Fallo de conexión de datos.");
            }
        }

        selectDoctor.addEventListener('change', () => {
            const docSel = selectDoctor.value;
            selectAnio.innerHTML = '<option value="">Seleccione el año...</option>';
            dashboardContent.classList.add('hidden');
            badgeContainer.classList.add('hidden');
            
            if(!docSel) {
                selectAnio.disabled = true;
                return;
            }

            const aniosDisponibles = Object.keys(bdData[docSel]).sort((a,b) => b - a);
            aniosDisponibles.forEach(anio => {
                if(anio !== "S/A") {
                    let opt = document.createElement('option');
                    opt.value = anio;
                    opt.textContent = anio;
                    selectAnio.appendChild(opt);
                }
            });
            
            selectAnio.disabled = false;
        });

        selectAnio.addEventListener('change', () => {
            const docSel = selectDoctor.value;
            const anioSel = selectAnio.value;

            if(!docSel || !anioSel) {
                dashboardContent.classList.add('hidden');
                badgeContainer.classList.add('hidden');
                return;
            }

            renderizarDashboard(bdData[docSel][anioSel]);
        });

function renderizarDashboard(dataAnio) {
    dashboardContent.classList.remove('hidden');
    badgeContainer.classList.remove('hidden');
    txtTotal.textContent = dataAnio.totalCirugias;

    Object.keys(chartsInstance).forEach(key => chartsInstance[key].destroy());

    // ==========================================
    // AJUSTE PRECISO: FILTRADO DE LÍNEAS PRINCIPALES (OCULTANDO 0)
    // ==========================================
    const LINEAS_OFICIALES = [
        "Artroscopia",
        "Prótesis de Rodilla",
        "Prótesis de Cadera",
        "Prótesis de Hombro",
        "Cirugía de Mano",
        "Prótesis de Mano",
        "Cirugía de Pie",
        "Osteosíntesis",
        "Columna",
        "Máxilofacial"
    ];

    const dataLineasCruda = dataAnio.porLineas || dataAnio.porLinea || {};
    let labelsLineasFiltradas = [];
    let valoresLineasFiltrados = [];

    // Evaluamos solo las oficiales y excluimos si el valor es 0
    LINEAS_OFICIALES.forEach(linea => {
        const valor = dataLineasCruda[linea] || 0;
        if (valor > 0) {
            labelsLineasFiltradas.push(linea);
            valoresLineasFiltrados.push(valor);
        }
    });

    // 1. Gráfico de Líneas Corregido
    const ctxLineas = document.getElementById('chart-lineas').getContext('2d');
    chartsInstance.lineas = new Chart(ctxLineas, {
        type: 'bar',
        data: {
            labels: labelsLineasFiltradas,
            datasets: [{
                data: valoresLineasFiltrados,
                backgroundColor: '#007cc2',
                borderRadius: 6,
                barThickness: 14
            }]
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { x: { grid: { display: false } }, y: { grid: { display: false } } }
        }
    });

    // 2. Evolución Mensual (Corregido para forzar números enteros limpios)
    const ctxMeses = document.getElementById('chart-meses').getContext('2d');
    chartsInstance.meses = new Chart(ctxMeses, {
        type: 'bar',
        data: {
            labels: ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'],
            datasets: [{
                data: dataAnio.porMes,
                backgroundColor: '#083264',
                borderRadius: 5,
                barThickness: 14
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { 
                x: { grid: { display: false } }, 
                y: { 
                    grid: { display: false },
                    ticks: {
                        // Fuerza a que solo se muestren números enteros en el eje
                        precision: 0,
                        callback: function(value) {
                            if (value % 1 === 0) { return value; }
                        }
                    }
                } 
            }
        }
    });

	// 3. Género (Corregido con colores representativos e iconos estéticos)
    const ctxGenero = document.getElementById('chart-genero').getContext('2d');
    chartsInstance.genero = new Chart(ctxGenero, {
        type: 'doughnut',
        data: {
            labels: ['🚺 F', '🚹 M'],
            datasets: [{
                data: [dataAnio.porSexo.F, dataAnio.porSexo.M],
                backgroundColor: ['#ff6b8b', '#007cc2'], // Rosado estético y Azul claro PIEMCA
                borderWidth: 3,
                borderColor: '#ffffff'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { 
                legend: { 
                    position: 'right', 
                    labels: { 
                        boxWidth: 14, 
                        font: { 
                            weight: 'bold',
                            size: 14
                        },
                        padding: 15
                    } 
                } 
            }
        }
    });

    // 4. Sub-líneas e Implantes (Se mantiene intacto el Top automático que te gustaba)
    const ctxSub = document.getElementById('chart-sublineas').getContext('2d');
    const subLineasOrdenadas = Object.entries(dataAnio.porSubLinea || {})
                                     .sort((a, b) => b[1] - a[1])
                                     .slice(0, 8);

    chartsInstance.sublineas = new Chart(ctxSub, {
        type: 'bar',
        data: {
            labels: subLineasOrdenadas.map(item => item[0]),
            datasets: [{
                data: subLineasOrdenadas.map(item => item[1]),
                backgroundColor: '#5c728a',
                borderRadius: 6,
                barThickness: 12
            }]
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { x: { grid: { display: false } }, y: { grid: { display: false } } }
        }
    });
}
    </script>
</body>
</html>
